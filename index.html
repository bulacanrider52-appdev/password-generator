<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Password Generator</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#0d1117;
    color:white;
    text-align:center;
    margin-top:50px;
}

.container{
    background:#161b22;
    padding:20px;
    margin:auto;
    width:350px;
    border-radius:10px;
}

input, button{
    padding:10px;
    margin:5px;
    width:90%;
    border:none;
    border-radius:5px;
}

button{
    cursor:pointer;
    color:white;
}

.generate{background:#00c853;}
.copy{background:#2196f3;}
.edit{background:#ff9800;}

/* 🔥 DITO LANG BINAGO */
.password{
    margin:10px;
    font-size:18px;
    word-break:break-all;
    color:black;          /* text color */
    background:white;     /* para readable */
}

.strength{
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>🔐 Password Generator</h2>

    <input type="number" id="length" value="12" min="6" max="64">

    <button class="generate" onclick="generatePassword()">Generate</button>
    <button class="copy" onclick="copyPassword()">Copy</button>
    <button class="edit" onclick="toggleEdit()">Edit</button>

    <input type="text" id="resultInput" class="password" readonly>

    <div class="strength" id="strength"></div>
</div>

<script>
let currentPassword = "";
let isEditing = false;

const words = [
    "shadow","hunter","dragon","storm","night",
    "ghost","fire","blade","wolf","steel",
    "phantom","dark","zero","nova","venom"
];

const symbols = "!@#$%^&*";
const numbers = "0123456789";

function generatePassword() {
    const length = document.getElementById("length").value;

    const word1 = randomWord();
    const word2 = randomWord();

    const number = randomChar(numbers, 2);
    const symbol = randomChar(symbols, 2);

    let password = word1 + symbol + word2 + number;

    password = password.slice(0, length);

    currentPassword = password;
    document.getElementById("resultInput").value = password;

    checkStrength(password);
}

function randomWord(){
    const array = new Uint32Array(1);
    crypto.getRandomValues(array);
    return words[array[0] % words.length];
}

function randomChar(set, count){
    let result = "";
    const array = new Uint32Array(count);
    crypto.getRandomValues(array);

    for(let i=0;i<count;i++){
        result += set[array[i] % set.length];
    }
    return result;
}

function copyPassword() {
    if (!currentPassword) return alert("Generate muna!");

    navigator.clipboard.writeText(currentPassword);
    alert("Copied!");
}

function toggleEdit(){
    const input = document.getElementById("resultInput");

    isEditing = !isEditing;

    if(isEditing){
        input.removeAttribute("readonly");
        input.focus();
    }else{
        input.setAttribute("readonly", true);
        currentPassword = input.value;
        checkStrength(currentPassword);
    }
}

function checkStrength(pw){
    let strength = "Weak";

    if(pw.length >= 12) strength = "Medium";
    if(pw.length >= 16) strength = "Strong";

    if(/[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[!@#$%^&*]/.test(pw)){
        strength = "Very Strong";
    }

    document.getElementById("strength").innerText = "Strength: " + strength;
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
